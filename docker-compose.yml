# ── BASE ──────────────────────────────────────────────
services:

  mysql:
    image: mysql:8.0
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-importer:
    build:
      context: ./etl
      dockerfile: Dockerfile
    volumes:
      - ./data:/data
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      JSONL_PATH: /data/raw-wiktextract-data.jsonl.gz
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy

